<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AEGIS Monitor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    width: 320px;
    background: #0f1117;
    color: #e2e8f0;
  }
  .header {
    background: linear-gradient(135deg, #1a1f35 0%, #0d1b2a 100%);
    padding: 16px 20px;
    border-bottom: 1px solid #2d3748;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo { font-size: 22px; }
  .header h1 { font-size: 16px; font-weight: 700; color: #63b3ed; }
  .header p { font-size: 11px; color: #718096; }
  .status-bar {
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    border-bottom: 1px solid #2d3748;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #48bb78;
    animation: pulse 2s infinite;
  }
  .dot.inactive { background: #718096; animation: none; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .body { padding: 16px 20px; }
  .field { margin-bottom: 12px; }
  .field label {
    display: block; font-size: 11px; color: #718096;
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;
  }
  .field input {
    width: 100%;
    background: #1a1f35;
    border: 1px solid #2d3748;
    border-radius: 6px;
    padding: 8px 12px;
    color: #e2e8f0;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: #63b3ed; }
  .btn {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
    margin-bottom: 8px;
  }
  .btn-start {
    background: linear-gradient(135deg, #2b6cb0, #3182ce);
    color: white;
  }
  .btn-start:hover { background: linear-gradient(135deg, #2c5282, #2b6cb0); }
  .btn-stop {
    background: #2d3748;
    color: #fc8181;
    border: 1px solid #fc8181;
  }
  .btn-stop:hover { background: #742a2a; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }
  .stat-card {
    background: #1a1f35;
    border-radius: 8px;
    padding: 10px;
    text-align: center;
    border: 1px solid #2d3748;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 700;
    display: block;
  }
  .stat-label { font-size: 10px; color: #718096; text-transform: uppercase; }
  .attention .stat-value { color: #48bb78; }
  .risk .stat-value { color: #fc8181; }
  .session-info {
    margin-top: 12px;
    background: #1a1f35;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 11px;
    color: #718096;
    border: 1px solid #2d3748;
    word-break: break-all;
  }
  .session-info span { color: #e2e8f0; display: block; font-size: 12px; }
  .alert {
    margin-top: 10px;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12px;
    display: none;
  }
  .alert.error { background: #742a2a; color: #fc8181; display: block; }
  .alert.success { background: #1a4731; color: #68d391; display: block; }
  .footer {
    padding: 10px 20px;
    font-size: 10px;
    color: #4a5568;
    text-align: center;
    border-top: 1px solid #2d3748;
  }
</style>
</head>
<body>
<div class="header">
  <div class="logo">🛡️</div>
  <div>
    <h1>AEGIS Monitor</h1>
    <p>Exam Integrity System v4</p>
  </div>
</div>

<div class="status-bar">
  <div class="dot inactive" id="statusDot"></div>
  <span id="statusText">Not monitoring</span>
</div>

<div class="body">
  <div id="setupForm">
    <div class="field">
      <label>Student ID</label>
      <input type="text" id="studentId" placeholder="e.g. STU001" />
    </div>
    <div class="field">
      <label>Session Code</label>
      <input type="text" id="examId" placeholder="e.g. ABC123" maxlength="6" style="text-transform:uppercase" />
    </div>
    <button class="btn btn-start" id="startBtn">▶ Start Monitoring</button>
  </div>

  <div id="activeView" style="display:none">
    <button class="btn btn-stop" id="stopBtn">⏹ Stop Monitoring</button>
    <div class="stats">
      <div class="stat-card attention">
        <span class="stat-value" id="attentionVal">100</span>
        <span class="stat-label">Attention</span>
      </div>
      <div class="stat-card risk">
        <span class="stat-value" id="riskVal">0</span>
        <span class="stat-label">Risk Score</span>
      </div>
    </div>
    <div class="session-info">
      Session ID:
      <span id="sessionIdDisplay">—</span>
    </div>
  </div>

  <div class="alert" id="alertBox"></div>
</div>

<div class="footer">AEGIS © 2024 — All activity monitored</div>

<script src="popup.js"></script>
</body>
</html>
